<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Surprise</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ffe4e6 0%, #fecdd3 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            text-align: center;
        }
        h1, h2 { color: #9f1239; margin-bottom: 10px; }
        #collection-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }
        .counter {
            font-size: 1.5rem;
            font-weight: bold;
            color: #be123c;
            background: rgba(255, 255, 255, 0.6);
            padding: 10px 20px;
            border-radius: 20px;
            margin-bottom: 20px;
            backdrop-filter: blur(5px);
            z-index: 10;
        }
        .flower {
            font-size: 3.5rem;
            position: absolute;
            cursor: pointer;
            transition: transform 0.2s ease, opacity 0.2s ease;
            user-select: none;
            animation: float 3s ease-in-out infinite alternate;
        }
        .flower:hover { transform: scale(1.2); }
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            100% { transform: translateY(-10px) rotate(5deg); }
        }
        #proposal-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 1s ease-in-out forwards;
            padding: 20px;
            z-index: 10;
        }
        .proposal-text {
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 40px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        .options-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn {
            padding: 15px 40px;
            font-size: 1.25rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            transition: all 0.2s;
        }
        .btn-yes { background-color: #10b981; color: white; }
        .btn-yes:hover { background-color: #059669; transform: scale(1.1); }
        .btn-wrong { background-color: #ef4444; color: white; }
        #success-screen {
            display: none;
            font-size: 2.5rem;
            color: #be123c;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        .big-heart {
            font-size: 6rem;
            animation: beat 0.8s infinite alternate;
            margin-top: 20px;
        }
        @keyframes beat { to { transform: scale(1.2); } }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes popIn {
            from { opacity: 0; transform: scale(0.5); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <div id="collection-screen">
        <h1>Pick the flowers to gather a bouquet! 🌸</h1>
        <div class="counter">Flowers Collected: <span id="count">0</span> / 5</div>
        <div id="garden"></div>
    </div>

    <div id="proposal-screen">
        <div class="proposal-text">Will you marry me? 💍</div>
        <div class="options-container">
            <button class="btn btn-yes" onclick="celebrate()">Yes! ❤️</button>
            <button class="btn btn-wrong" onclick="wrongOption(this)">No</button>
            <button class="btn btn-wrong" onclick="wrongOption(this)">No way</button>
        </div>
    </div>

    <div id="success-screen">
        <h2>Yay! Best decision ever! 🥂✨</h2>
        <div class="big-heart">❤️</div>
    </div>

    <script>
        let flowersCollected = 0;
        const totalFlowersNeeded = 5;
        const flowerEmojis = ['🌸', '🌹', '🌷', '🌻', '🌺'];
        const garden = document.getElementById('garden');

        function spawnFlowers() {
            for (let i = 0; i < totalFlowersNeeded; i++) {
                const flower = document.createElement('div');
                flower.classList.add('flower');
                flower.innerText = flowerEmojis[i % flowerEmojis.length];
                flower.style.left = Math.random() * 80 + 10 + '%';
                flower.style.top = Math.random() * 60 + 20 + '%';
                flower.style.animationDelay = Math.random() * 2 + 's';

                flower.addEventListener('click', function() {
                    flower.style.opacity = '0';
                    flower.style.transform = 'scale(0)';
                    setTimeout(() => flower.remove(), 200);
                    
                    flowersCollected++;
                    document.getElementById('count').innerText = flowersCollected;

                    if (flowersCollected === totalFlowersNeeded) {
                        setTimeout(showProposal, 600);
                    }
                });

                garden.appendChild(flower);
            }
        }

        function showProposal() {
            document.getElementById('collection-screen').style.display = 'none';
            document.getElementById('proposal-screen').style.display = 'flex';
        }

        function wrongOption(button) {
            alert("Oops, looks like something went wrong with that button! Try a different one. 😉");
            button.innerText = "Yes! 😍";
            button.className = "btn btn-yes";
            button.onclick = celebrate;
        }

        function celebrate() {
            document.getElementById('proposal-screen').style.display = 'none';
            document.getElementById('success-screen').style.display = 'block';
            document.body.style.background = "linear-gradient(135deg, #fce7f3 0%, #fbcfe8 100%)";
            for (let i = 0; i < 30; i++) { createConfetti(); }
        }

        function createConfetti() {
            const confetti = document.createElement('div');
            confetti.innerText = ['🎉', '✨', '💖', '🌸'][Math.floor(Math.random() * 4)];
            confetti.style.position = 'absolute';
            confetti.style.left = Math.random() * 100 + 'vw';
            confetti.style.top = '-5vh';
            confetti.style.fontSize = Math.random() * 1.5 + 1 + 'rem';
            confetti.style.zIndex = '1';
            confetti.style.transition = 'transform 2s linear, opacity 2s linear';
            document.body.appendChild(confetti);

            setTimeout(() => {
                confetti.style.transform = `translateY(105vh) rotate(${Math.random() * 360}deg)`;
                confetti.style.opacity = '0';
            }, 50);

            setTimeout(() => confetti.remove(), 2500);
        }

        spawnFlowers();
    </script>
</body>
</html>
